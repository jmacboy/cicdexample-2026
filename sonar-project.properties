sonar-project.properties
# Reemplazar con los valores del Paso 4
sonar.projectKey=jmacboy_cicdexample-2026
sonar.organization=jmacboy
 
# Nombre que aparece en el dashboard de SonarCloud
sonar.projectName=cicdexample-2026
 
# Excluir archivos que no deben analizarse
sonar.exclusions=**/Migrations/**,**/obj/**,**/bin/**
 
# Rutas de los reportes de cobertura generados por el pipeline
# El path es relativo a la raíz del repo
sonar.cs.opencover.reportsPaths=coverage/**/coverage.opencover.xml
 
# Excluir los proyectos de tests del análisis de cobertura
sonar.coverage.exclusions=**Tests*/**,**Specs*/**
